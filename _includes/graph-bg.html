<canvas id="graph-bg" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>
<script>
(function() {
    var canvas = document.getElementById('graph-bg');
    var ctx = canvas.getContext('2d');
    var width, height, nodes = [], edges = [];
    // Intensity: 1.0 = homepage, 0.3 = subtle background
    var intensity = {{ include.intensity | default: 0.3 }};
    var density = {{ include.density | default: 20000 }};
    var mouse = { x: -1000, y: -1000 };

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    function createNodes() {
        nodes = [];
        var count = Math.floor(width * height / density);
        for (var i = 0; i < count; i++) {
            nodes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                r: Math.random() * 2 + 1,
                pulse: Math.random() * Math.PI * 2
            });
        }
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);
        var time = Date.now() * 0.001;

        for (var i = 0; i < nodes.length; i++) {
            var node = nodes[i];
            node.x += node.vx;
            node.y += node.vy;
            node.pulse += 0.02;
            if (node.x < 0 || node.x > width) node.vx *= -1;
            if (node.y < 0 || node.y > height) node.vy *= -1;

            var dx = node.x - mouse.x;
            var dy = node.y - mouse.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 200 && dist > 0) {
                var force = (200 - dist) / 200 * 0.5;
                node.vx += (dx / dist) * force;
                node.vy += (dy / dist) * force;
            }
            node.vx *= 0.99;
            node.vy *= 0.99;
        }

        // Edges
        var threshold = 150;
        for (var i = 0; i < nodes.length; i++) {
            for (var j = i + 1; j < nodes.length; j++) {
                var dx = nodes[i].x - nodes[j].x;
                var dy = nodes[i].y - nodes[j].y;
                var dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < threshold) {
                    var alpha = (1 - dist / threshold) * 0.08 * intensity;
                    ctx.strokeStyle = 'rgba(0,0,0,' + alpha + ')';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(nodes[i].x, nodes[i].y);
                    ctx.lineTo(nodes[j].x, nodes[j].y);
                    ctx.stroke();
                }
            }
        }

        // Nodes
        for (var i = 0; i < nodes.length; i++) {
            var node = nodes[i];
            var pulse = Math.sin(node.pulse) * 0.5 + 0.5;
            var alpha = (0.1 + pulse * 0.2) * intensity;
            ctx.fillStyle = 'rgba(0,0,0,' + alpha + ')';
            ctx.beginPath();
            ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);
            ctx.fill();
        }

        // Op-art rings
        if (intensity > 0.5) {
            for (var i = 0; i < 3; i++) {
                var phase = time * 0.2 + i * 2.1;
                var cx = width * (0.3 + Math.sin(phase) * 0.2);
                var cy = height * (0.4 + Math.cos(phase * 0.7) * 0.2);
                var maxR = 200 + Math.sin(phase * 0.5) * 100;
                for (var r = 10; r < maxR; r += 20) {
                    var alpha = (1 - r / maxR) * 0.02 * intensity;
                    ctx.strokeStyle = 'rgba(0,0,0,' + alpha + ')';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }

        requestAnimationFrame(animate);
    }

    // Mouse tracking — only respond if homepage intensity
    if (intensity > 0.5) {
        document.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
        document.addEventListener('mouseleave', function() { mouse.x = -1000; mouse.y = -1000; });
    }

    window.addEventListener('resize', function() { resize(); createNodes(); });
    resize();
    createNodes();
    animate();
})();
</script>

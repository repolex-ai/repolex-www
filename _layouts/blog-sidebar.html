<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}repolex.ai</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    {% include topnav.html %}
    {% include graph-bg.html intensity=0.15 density=30000 %}

    <div class="blog-layout">
        <button class="mobile-menu-toggle" id="menuToggle">☰ Menu</button>

        <div class="nav-sidebar" id="navSidebar">
            <div class="nav-header">
                <p class="nav-subtitle">Tech Notes</p>
            </div>
            <div class="post-list">
                {% for post in site.posts %}
                {% unless post.status == "draft" %}
                <div class="post-link{% if page.url == post.url %} current{% endif %}">
                    <a href="{{ post.url | relative_url }}">
                        <span class="date">{{ post.date | date: "%B %-d, %Y" }}</span>
                        <span class="title">{{ post.title }}</span>
                    </a>
                </div>
                {% endunless %}
                {% endfor %}
            </div>
        </div>
        <div class="content-area">
            {{ content }}
        </div>

        <footer class="blog-footer">
            <p><a href="{{ '/' | relative_url }}">Home</a> | <a href="{{ '/blog' | relative_url }}">Blog</a> | <a href="https://github.com/repolex-ai">GitHub</a></p>
        </footer>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const menuToggle = document.getElementById('menuToggle');
        const navSidebar = document.getElementById('navSidebar');

        if (menuToggle && navSidebar) {
            menuToggle.addEventListener('click', function() {
                navSidebar.classList.toggle('open');
                this.textContent = navSidebar.classList.contains('open') ? '✕ Close' : '☰ Menu';
            });

            const postLinks = navSidebar.querySelectorAll('.post-link a');
            postLinks.forEach(link => {
                link.addEventListener('click', function() {
                    if (window.innerWidth <= 768) {
                        navSidebar.classList.remove('open');
                        menuToggle.textContent = '☰ Menu';
                    }
                });
            });

            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 768 &&
                    !navSidebar.contains(e.target) &&
                    e.target !== menuToggle) {
                    navSidebar.classList.remove('open');
                    menuToggle.textContent = '☰ Menu';
                }
            });
        }
    });
    </script>
</body>
</html>
